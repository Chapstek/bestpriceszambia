<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Loyalbir – Tech & More</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   <!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://unpkg.com/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-top">
            <div class="logo">
                <a href="index.html" aria-label="Loyalbir Home">
                    <img src="loyalbir.png" alt="Loyalbir logo" width="140" height="40">
                </a>
            </div>
            <div class="search-bar">
    <input 
        type="search" 
        id="search-input" 
        placeholder="Search products…" 
        aria-label="Search products"
    >
    <!-- Remove the <button> entirely or keep it without icon if you want a visible button -->
</div>
            <div class="user-actions">
                <a href="compare.html" class="action-icon" id="compare-count" aria-label="Compare products">Compare (<span>0</span>)</a>
                <a href="wishlist.html" class="action-icon" id="wishlist-count" aria-label="Wishlist">Wishlist (<span>0</span>)</a>
                <a href="cart.html" class="action-icon" id="cart-count" aria-label="Shopping cart">Cart (<span>0</span>)</a>
                <a href="cart.html" class="action-icon view-cart-btn">View Cart</a>
            </div>
        </div>

        <button type="button" class="hamburger" aria-label="Toggle main menu" aria-expanded="false" aria-controls="main-nav">
            <span class="sr-only">Menu</span>
            <span aria-hidden="true">☰</span>
        </button>

        <nav class="top-nav" id="main-nav" aria-label="Main navigation">
            <ul role="list">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="sellers.html">Sellers</a></li>
                <li><a href="brands.html">All Brands</a></li>
                <li><a href="categories.html">All Categories</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
            </ul>
        </nav>
        <div class="nav-overlay" aria-hidden="true"></div>
    </header>

    <nav class="breadcrumb" aria-label="Breadcrumb" aria-live="polite"></nav>

    <main>
        <section class="products" aria-labelledby="new-products-heading">
            <div class="section-header">
                <h1 id="new-products-heading">New Products</h1>
                <a href="products.html" class="view-all">View all new products →</a>
            </div>

            <div class="swiper">
                <div class="swiper-wrapper" id="product-list">
                    <!-- Products populated by JS -->
                </div>
                <div class="swiper-pagination"></div>
                <div class="swiper-button-prev" aria-label="Previous product"></div>
                <div class="swiper-button-next" aria-label="Next product"></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact</a>
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
        </div>
       
    </footer>

    <nav class="bottom-nav" aria-label="Main mobile navigation">
        <ul>
            <li><a href="index.html" class="active"><i class="fas fa-home"></i><span class="label">Home</span></a></li>
            <li><a href="categories.html"><i class="fas fa-th-large"></i><span class="label">Categories</span></a></li>
            <li><a href="notifications.html"><i class="fas fa-bell"></i><span class="label">Notifications</span></a></li>
            <li><a href="compare.html"><i class="fas fa-balance-scale"></i><span class="label">Compare</span></a></li>
            <li><a href="wishlist.html"><i class="fas fa-heart"></i><span class="label">Wishlist</span></a></li>
        </ul>
    </nav>


    <!-- Scripts -->
    <script src="https://unpkg.com/swiper@11/swiper-bundle.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // ─── Swiper ─────────────────────────────────────────────────────
        let swiper;
        try {
            swiper = new Swiper('.swiper', {
                loop: true,
                slidesPerView: 1.08,
                centeredSlides: true,
                centeredSlidesBounds: true,
                spaceBetween: 16,
                grabCursor: true,
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev',
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true,
                    dynamicBullets: true,
                },
                breakpoints: {
                    480:  { slidesPerView: 1.1  },
                    640:  { slidesPerView: 2, centeredSlides: false },
                    1024: { slidesPerView: 3, centeredSlides: false },
                }
            });
        } catch (err) {
            console.error('Swiper failed:', err);
        }

        // Sample products
        const products = [
            { id: 1, name: "Apple iPhone 15 Pro Max 256GB", price: "ZMW 29,999.12", img: "iphones.png" },
            { id: 2, name: "Casio G-Shock", price: "ZMW 4,331.45", img: "GSHOCK.png" },
            { id: 3, name: "CAT S62 Smartphone", price: "ZMW 6,336.38", img: "CATS62.png" },
        ];

        // Populate slides
        const productList = document.getElementById('product-list');
        if (productList) {
            products.forEach(p => {
                const slide = document.createElement('div');
                slide.className = 'swiper-slide';
                slide.dataset.productId = p.id;
                slide.innerHTML = `
                    <div class="product-card">
                        <a href="product.html?id=${p.id}" aria-label="View ${p.name}">
                            <img src="${p.img}" alt="${p.name}" loading="lazy" width="300" height="300">
                        </a>
                        <div class="product-info">
                            <p class="product-name">${p.name}</p>
                            <p class="price">${p.price}</p>
                            <div class="rating" aria-label="5 stars">★★★★★</div>
                        </div>
                        <div class="product-actions">
                            <button type="button" class="add-to-cart" data-id="${p.id}">Add to Cart</button>
                            <button type="button" class="add-to-wishlist" data-id="${p.id}">♡</button>
                            <button type="button" class="add-to-compare" data-id="${p.id}">Compare</button>
                        </div>
                    </div>
                `;
                productList.appendChild(slide);
            });
            if (swiper) swiper.update();
        }

        // ─── Cart / Wishlist / Compare ──────────────────────────────────
        function updateCounts() {
            const cart     = JSON.parse(localStorage.getItem('cart')     || '[]');
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const compare  = JSON.parse(localStorage.getItem('compare')  || '[]');
            document.getElementById('cart-count')    .innerHTML = `Cart (${cart.length})`;
            document.getElementById('wishlist-count').innerHTML = `Wishlist (${wishlist.length})`;
            document.getElementById('compare-count') .innerHTML = `Compare (${compare.length})`;
        }

        document.addEventListener('click', e => {
            const btn = e.target.closest('.add-to-cart, .add-to-wishlist, .add-to-compare');
            if (!btn) return;
            const id = parseInt(btn.dataset.id);
            if (!id) return;

            let key, msg;
            if (btn.classList.contains('add-to-cart'))     { key = 'cart';     msg = 'Added to cart!'; }
            else if (btn.classList.contains('add-to-wishlist')) { key = 'wishlist'; msg = 'Added to wishlist!'; }
            else if (btn.classList.contains('add-to-compare'))  { key = 'compare';  msg = 'Added to compare!'; }

            let list = JSON.parse(localStorage.getItem(key) || '[]');
            if (list.includes(id)) {
                alert('Already in list!');
                return;
            }

            list.push(id);
            localStorage.setItem(key, JSON.stringify(list));
            updateCounts();

            if (btn.classList.contains('add-to-wishlist')) {
                btn.textContent = '❤️';
                btn.style.color = 'red';
            } else {
                const orig = btn.textContent;
                btn.textContent = '✓ Added';
                btn.disabled = true;
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.disabled = false;
                }, 1200);
            }

            alert(msg);
        });

        // ─── Search ─────────────────────────────────────────────────────
        document.getElementById('search-btn')?.addEventListener('click', () => {
            const term = document.getElementById('search-input')?.value?.trim();
            if (term) {
                window.location.href = `products.html?search=${encodeURIComponent(term)}`;
            } else {
                alert('Please enter a search term');
            }
        });

        // ─── Hamburger Menu ─────────────────────────────────────────────
        const hamburger = document.querySelector('.hamburger');
        const nav = document.getElementById('main-nav');
        const overlay = document.querySelector('.nav-overlay');

        hamburger?.addEventListener('click', () => {
            const expanded = hamburger.getAttribute('aria-expanded') === 'true';
            hamburger.setAttribute('aria-expanded', !expanded);
            nav.classList.toggle('active');
            overlay.classList.toggle('active');
            document.body.classList.toggle('menu-open');
        });

        overlay?.addEventListener('click', () => {
            hamburger.setAttribute('aria-expanded', 'false');
            nav.classList.remove('active');
            overlay.classList.remove('active');
            document.body.classList.remove('menu-open');
        });

       // Handle Newsletter Form Submission
    document.getElementById('newsletter-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('newsletter-email').value;
        const subscribers = JSON.parse(localStorage.getItem('subscribers')) || [];
        subscribers.push(email);
        localStorage.setItem('subscribers', JSON.stringify(subscribers));
        console.log('Subscriber email captured:', email);
        alert('Thank you for subscribing!');
        e.target.reset();
    });

        // Initial counts
        updateCounts();
    });
    </script>
</body>
</html>
